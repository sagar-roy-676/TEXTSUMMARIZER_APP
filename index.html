<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Text Summarizer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{

    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    background-size:400% 400%;
    animation:bg 12s infinite alternate;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

}

@keyframes bg{

0%{background-position:left;}
100%{background-position:right;}

}

.card{

width:850px;
max-width:100%;
background:rgba(255,255,255,.1);
backdrop-filter:blur(18px);
padding:35px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,.3);
color:white;

}

h1{

text-align:center;
font-size:40px;
margin-bottom:10px;

}

p{

text-align:center;
opacity:.9;
margin-bottom:25px;

}

textarea{

width:100%;
height:220px;
padding:18px;
font-size:16px;
border:none;
border-radius:15px;
outline:none;
resize:none;
background:white;
color:#333;

}

.buttons{

display:flex;
gap:15px;
margin-top:20px;

}

button{

flex:1;
padding:15px;
font-size:17px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:.3s;

}

#summarize{

background:#00c853;
color:white;

}

#summarize:hover{

background:#00b248;

}

#clear{

background:#ef4444;
color:white;

}

#clear:hover{

background:#dc2626;

}

.output{

margin-top:30px;
background:white;
color:#111827;
padding:20px;
border-radius:15px;
min-height:180px;

}

.output h2{

margin-bottom:10px;
color:#2563eb;

}

#summary-text{

line-height:1.8;
font-size:16px;

}

.loader{

display:none;
margin-top:15px;
text-align:center;

}

.spinner{

width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;

}

@keyframes spin{

100%{transform:rotate(360deg);}

}

.copy{

margin-top:15px;
background:#2563eb;
color:white;
width:100%;

}

.copy:hover{

background:#1d4ed8;

}

footer{

margin-top:25px;
text-align:center;
font-size:14px;
opacity:.8;

}

</style>

</head>

<body>

<div class="card">

<h1>🤖 AI Text Summarizer</h1>

<p>Powered by FastAPI • HuggingFace T5 • PyTorch</p>

<form id="summarization-form">

<textarea
id="dialogue-input"
placeholder="Paste your article or text here..."></textarea>

<div class="buttons">

<button id="summarize" type="submit">
✨ Summarize
</button>

<button id="clear" type="button">
🗑 Clear
</button>

</div>

</form>

<div class="loader" id="loader">

<div class="spinner"></div>

<p>Generating Summary...</p>

</div>

<div class="output">

<h2>Summary</h2>

<p id="summary-text">
Your summary will appear here...
</p>

<button class="copy" onclick="copySummary()">
📋 Copy Summary
</button>

</div>

<footer>

Developed with ❤️ using FastAPI & Transformers

</footer>

</div>

<script>

const form=document.getElementById("summarization-form");
const loader=document.getElementById("loader");
const summary=document.getElementById("summary-text");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const dialogue=document.getElementById("dialogue-input").value.trim();

if(dialogue===""){

alert("Please enter some text.");

return;

}

loader.style.display="block";

summary.innerHTML="";

try{

const response=await fetch("/summarize/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
dialogue:dialogue
})

});

const data=await response.json();

summary.innerHTML=data.summary;

}

catch(error){

summary.innerHTML="❌ Server Error";

}

loader.style.display="none";

});

document.getElementById("clear").onclick=function(){

document.getElementById("dialogue-input").value="";

summary.innerHTML="";

};

function copySummary(){

navigator.clipboard.writeText(summary.innerText);

alert("Summary copied!");

}

</script>

</body>
</html>
